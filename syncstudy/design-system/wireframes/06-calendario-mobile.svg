    <rect width="32" height="32" rx="8" fill="transparent"/>
    <path d="M 20 10 L 14 16 L 20 22" fill="none" stroke="#4B5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="184" y="22" fill="#1D1D1F" font-size="16" font-weight="600" text-anchor="middle">Mayo 2026</text>

    <g transform="translate(336, 0)">
      <rect width="32" height="32" rx="8" fill="transparent"/>
      <path d="M 12 10 L 18 16 L 12 22" fill="none" stroke="#4B5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
