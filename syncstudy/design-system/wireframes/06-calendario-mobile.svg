    <text x="20" y="44" fill="#9CA3AF" font-size="11" text-anchor="middle">Grupo</text>
  </g>
  <g transform="translate(280, 752)">
    <rect x="13" y="12" width="3" height="10" rx="1" fill="#9CA3AF"/>
    <rect x="18" y="8" width="3" height="14" rx="1" fill="#9CA3AF"/>
    <rect x="23" y="4" width="3" height="18" rx="1" fill="#9CA3AF"/>
    <text x="20" y="44" fill="#9CA3AF" font-size="11" text-anchor="middle">Resumen</text>
  </g>

  <g transform="translate(200, 808)" fill="#9CA3AF" font-size="9">
    <text x="0" y="0" text-anchor="middle">Wireframe móvil · Pantalla Calendario</text>
  </g>
