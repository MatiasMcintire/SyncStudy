        <text x="6" y="14" fill="#9CA3AF">28</text>
        <rect x="50" width="44" height="44" rx="6" fill="white" opacity="0.4"/>
        <text x="56" y="14" fill="#9CA3AF">29</text>
        <rect x="100" width="44" height="44" rx="6" fill="white" opacity="0.4"/>
        <text x="106" y="14" fill="#9CA3AF">30</text>
        <rect x="150" width="44" height="44" rx="6" fill="white"/>
        <text x="156" y="14" fill="#1D1D1F">1</text>
