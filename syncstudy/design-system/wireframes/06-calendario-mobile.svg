      <rect x="0" y="0" width="3" height="56" rx="1.5" fill="#EF4444"/>
      <text x="16" y="22" fill="#1D1D1F" font-size="13" font-weight="500">Entregar informe de cultivos</text>
      <text x="16" y="38" fill="#9CA3AF" font-size="11">Hoy · Cultivos · Alta</text>
