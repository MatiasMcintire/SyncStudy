      <g transform="translate(0, 208)" font-size="11">
        <rect width="44" height="44" rx="6" fill="white"/>
        <text x="6" y="14" fill="#1D1D1F">26</text>
        <rect x="50" width="44" height="44" rx="6" fill="white"/>
        <text x="56" y="14" fill="#1D1D1F">27</text>
        <rect x="100" width="44" height="44" rx="6" fill="white"/>
        <text x="106" y="14" fill="#1D1D1F">28</text>
        <rect x="150" width="44" height="44" rx="6" fill="white"/>
        <text x="156" y="14" fill="#1D1D1F">29</text>
        <rect x="200" width="44" height="44" rx="6" fill="white"/>
        <text x="206" y="14" fill="#1D1D1F">30</text>
        <rect x="250" width="44" height="44" rx="6" fill="white"/>
        <text x="256" y="14" fill="#1D1D1F">31</text>
