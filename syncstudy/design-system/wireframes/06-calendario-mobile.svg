  <g transform="translate(40, 752)">
    <circle cx="20" cy="14" r="8" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <text x="20" y="44" fill="#9CA3AF" font-size="11" text-anchor="middle">Hoy</text>
  </g>
  <!-- Tab activo: Calendario -->
  <g transform="translate(120, 752)">
    <rect x="12" y="6" width="16" height="16" rx="2" fill="none" stroke="#2563EB" stroke-width="2"/>
    <text x="20" y="44" fill="#2563EB" font-size="11" font-weight="600" text-anchor="middle">Calendario</text>
