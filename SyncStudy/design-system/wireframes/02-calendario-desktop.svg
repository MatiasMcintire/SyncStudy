    <rect x="60" y="-8" width="3" height="12" rx="1" fill="#EF4444"/>
    <text x="68" y="0">Alta</text>
    <rect x="100" y="-8" width="3" height="12" rx="1" fill="#F59E0B"/>
    <text x="108" y="0">Media</text>
    <rect x="148" y="-8" width="3" height="12" rx="1" fill="#10B981"/>
    <text x="156" y="0">Baja</text>
