        <rect x="0" y="0" width="3" height="22" rx="1" fill="#EF4444"/>
        <text x="8" y="14" fill="#1D1D1F" font-size="10">Informe cultivos</text>
      </g>
      <g transform="translate(8, 92)">
        <rect width="100" height="22" rx="3" fill="#F7F7F8"/>
        <rect x="0" y="0" width="3" height="22" rx="1" fill="#F59E0B"/>
        <text x="8" y="14" fill="#1D1D1F" font-size="10">Artículo Sust...</text>
      </g>
    </g>

