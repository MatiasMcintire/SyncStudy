<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <!-- Fondo general -->
  <rect width="1280" height="800" fill="#FFFFFF"/>

  <!-- SIDEBAR -->
  <rect x="0" y="0" width="240" height="800" fill="#F7F7F8"/>
  <line x1="240" y1="0" x2="240" y2="800" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Brand -->
  <g transform="translate(24, 28)">
    <rect width="36" height="36" rx="8" fill="#2563EB"/>
    <text x="18" y="24" fill="white" font-size="16" font-weight="700" text-anchor="middle">S</text>
    <text x="48" y="16" fill="#1D1D1F" font-size="15" font-weight="600">SyncStudy</text>
    <text x="48" y="32" fill="#9CA3AF" font-size="11">Estudia en sincronía</text>
  </g>

  <!-- Nav items -->
  <g transform="translate(16, 96)">
    <!-- Hoy -->
    <rect width="208" height="36" rx="8" fill="transparent"/>
    <circle cx="28" cy="18" r="9" fill="none" stroke="#4B5563" stroke-width="1.5"/>
    <text x="48" y="22" fill="#4B5563" font-size="14" font-weight="500">Hoy</text>

    <!-- Active: Calendario -->
    <g transform="translate(0, 44)">
      <rect width="208" height="36" rx="8" fill="white"/>
      <rect x="20" y="9" width="16" height="16" rx="2" fill="none" stroke="#1D1D1F" stroke-width="1.5"/>
      <text x="48" y="22" fill="#1D1D1F" font-size="14" font-weight="500">Calendario</text>
    </g>

    <g transform="translate(0, 88)">
      <rect width="208" height="36" rx="8" fill="transparent"/>
      <circle cx="24" cy="18" r="5" fill="none" stroke="#4B5563" stroke-width="1.5"/>
      <circle cx="34" cy="18" r="5" fill="none" stroke="#4B5563" stroke-width="1.5"/>
      <text x="48" y="22" fill="#4B5563" font-size="14" font-weight="500">Mi grupo</text>
    </g>

    <g transform="translate(0, 132)">
      <rect width="208" height="36" rx="8" fill="transparent"/>
      <rect x="20" y="16" width="3" height="10" rx="1" fill="#4B5563"/>
      <rect x="25" y="12" width="3" height="14" rx="1" fill="#4B5563"/>
      <rect x="30" y="8" width="3" height="18" rx="1" fill="#4B5563"/>
      <text x="48" y="22" fill="#4B5563" font-size="14" font-weight="500">Resumen semanal</text>
    </g>
  </g>

  <!-- Sidebar usuario -->
  <g transform="translate(16, 720)">
    <rect width="208" height="60" rx="8" fill="white"/>
    <circle cx="34" cy="30" r="18" fill="#2563EB"/>
    <text x="34" y="36" fill="white" font-size="14" font-weight="600" text-anchor="middle">F</text>
    <text x="62" y="26" fill="#1D1D1F" font-size="13" font-weight="600">Fabián Riquelme</text>
