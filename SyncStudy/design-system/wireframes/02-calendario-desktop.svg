      <text x="58" y="20" fill="#9CA3AF" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.5">SÁB</text>
      <text x="58" y="40" fill="#1D1D1F" font-size="17" font-weight="600" text-anchor="middle">16</text>
      <line x1="12" y1="52" x2="104" y2="52" stroke="#E5E7EB" stroke-width="1"/>
    </g>

    <!-- Día 7 - Domingo -->
    <g transform="translate(732, 12)">
      <rect width="116" height="472" rx="8" fill="white"/>
      <text x="58" y="20" fill="#9CA3AF" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.5">DOM</text>
      <text x="58" y="40" fill="#1D1D1F" font-size="17" font-weight="600" text-anchor="middle">17</text>
      <line x1="12" y1="52" x2="104" y2="52" stroke="#E5E7EB" stroke-width="1"/>
