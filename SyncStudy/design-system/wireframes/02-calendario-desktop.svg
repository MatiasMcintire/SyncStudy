      <rect width="116" height="472" rx="8" fill="white"/>
      <text x="58" y="20" fill="#9CA3AF" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.5">JUE</text>
      <text x="58" y="40" fill="#1D1D1F" font-size="17" font-weight="600" text-anchor="middle">14</text>
      <line x1="12" y1="52" x2="104" y2="52" stroke="#E5E7EB" stroke-width="1"/>
      <g transform="translate(8, 64)">
        <rect width="100" height="22" rx="3" fill="#F7F7F8"/>
        <rect x="0" y="0" width="3" height="22" rx="1" fill="#F59E0B"/>
        <text x="8" y="14" fill="#1D1D1F" font-size="10">Estadística cap. 3</text>
      </g>
    </g>

    <!-- Día 5 - Viernes -->
    <g transform="translate(492, 12)">
      <rect width="116" height="472" rx="8" fill="white"/>
      <text x="58" y="20" fill="#9CA3AF" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.5">VIE</text>
      <text x="58" y="40" fill="#1D1D1F" font-size="17" font-weight="600" text-anchor="middle">15</text>
      <line x1="12" y1="52" x2="104" y2="52" stroke="#E5E7EB" stroke-width="1"/>
    </g>

    <!-- Día 6 - Sábado -->
