  <text x="272" y="40" fill="#1D1D1F" font-size="20" font-weight="600">Calendario</text>

  <!-- Botón Nueva tarea -->
  <g transform="translate(1136, 16)">
    <rect width="128" height="36" rx="8" fill="#2563EB"/>
    <line x1="20" y1="18" x2="28" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="14" x2="24" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="42" y="22" fill="white" font-size="13" font-weight="500">Nueva tarea</text>
  </g>

  <!-- =========================================== -->
  <!-- TOOLBAR DEL CALENDARIO -->
  <!-- =========================================== -->
  <g transform="translate(272, 96)">
    <!-- Navegación de fechas -->
    <g transform="translate(0, 0)">
      <rect width="32" height="32" rx="8" fill="transparent"/>
      <path d="M 20 10 L 14 16 L 20 22" fill="none" stroke="#4B5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <text x="48" y="22" fill="#1D1D1F" font-size="17" font-weight="600">11 May – 17 May</text>

      <g transform="translate(220, 0)">
