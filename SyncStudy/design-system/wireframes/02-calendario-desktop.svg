  <!-- ANOTACIÓN -->
  <g transform="translate(1080, 760)" fill="#9CA3AF" font-size="10">
    <text x="200" y="0" text-anchor="end">Wireframe · Pantalla 2/4 · Vista Calendario semanal (Desktop)</text>
  </g>
