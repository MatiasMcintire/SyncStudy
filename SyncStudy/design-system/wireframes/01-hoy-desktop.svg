<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <!-- Fondo general -->
  <rect width="1280" height="800" fill="#FFFFFF"/>

  <!-- =========================================== -->
  <!-- SIDEBAR -->
  <!-- =========================================== -->
  <rect x="0" y="0" width="240" height="800" fill="#F7F7F8"/>
  <line x1="240" y1="0" x2="240" y2="800" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Brand -->
  <g transform="translate(24, 28)">
    <rect width="36" height="36" rx="8" fill="#2563EB"/>
    <text x="18" y="24" fill="white" font-size="16" font-weight="700" text-anchor="middle">S</text>
    <text x="48" y="16" fill="#1D1D1F" font-size="15" font-weight="600">SyncStudy</text>
    <text x="48" y="32" fill="#9CA3AF" font-size="11">Estudia en sincronía</text>
  </g>

  <!-- Nav items -->
  <g transform="translate(16, 96)">
    <!-- Active: Hoy -->
    <rect width="208" height="36" rx="8" fill="white"/>
    <circle cx="28" cy="18" r="9" fill="none" stroke="#1D1D1F" stroke-width="1.5"/>
    <text x="48" y="22" fill="#1D1D1F" font-size="14" font-weight="500">Hoy</text>

    <!-- Calendario -->
    <g transform="translate(0, 44)">
      <rect width="208" height="36" rx="8" fill="transparent"/>
      <rect x="20" y="9" width="16" height="16" rx="2" fill="none" stroke="#4B5563" stroke-width="1.5"/>
      <text x="48" y="22" fill="#4B5563" font-size="14" font-weight="500">Calendario</text>
    </g>

    <!-- Mi grupo -->
    <g transform="translate(0, 88)">
      <rect width="208" height="36" rx="8" fill="transparent"/>
      <circle cx="24" cy="18" r="5" fill="none" stroke="#4B5563" stroke-width="1.5"/>
      <circle cx="34" cy="18" r="5" fill="none" stroke="#4B5563" stroke-width="1.5"/>
      <text x="48" y="22" fill="#4B5563" font-size="14" font-weight="500">Mi grupo</text>
    </g>

    <!-- Resumen -->
    <g transform="translate(0, 132)">
      <rect width="208" height="36" rx="8" fill="transparent"/>
      <rect x="20" y="16" width="3" height="10" rx="1" fill="#4B5563"/>
      <rect x="25" y="12" width="3" height="14" rx="1" fill="#4B5563"/>
      <rect x="30" y="8" width="3" height="18" rx="1" fill="#4B5563"/>
      <text x="48" y="22" fill="#4B5563" font-size="14" font-weight="500">Resumen semanal</text>
    </g>
  </g>

  <!-- Sidebar usuario -->
  <g transform="translate(16, 720)">
    <rect width="208" height="60" rx="8" fill="white"/>
    <circle cx="34" cy="30" r="18" fill="#2563EB"/>
    <text x="34" y="36" fill="white" font-size="14" font-weight="600" text-anchor="middle">F</text>
    <text x="62" y="26" fill="#1D1D1F" font-size="13" font-weight="600">Fabián Riquelme</text>
    <text x="62" y="42" fill="#9CA3AF" font-size="11">TUPA · 2° año</text>
  </g>

  <!-- =========================================== -->
  <!-- TOPBAR -->
  <!-- =========================================== -->
  <line x1="240" y1="64" x2="1280" y2="64" stroke="#E5E7EB" stroke-width="1"/>
  <text x="272" y="40" fill="#1D1D1F" font-size="20" font-weight="600">Hoy</text>

  <!-- Botón Nueva tarea -->
  <g transform="translate(1136, 16)">
    <rect width="128" height="36" rx="8" fill="#2563EB"/>
    <line x1="20" y1="18" x2="28" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="14" x2="24" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="42" y="22" fill="white" font-size="13" font-weight="500">Nueva tarea</text>
  </g>

  <!-- =========================================== -->
  <!-- HERO: Saludo + Progreso del grupo -->
  <!-- =========================================== -->
  <g transform="translate(272, 96)">
    <!-- Saludo -->
    <text x="0" y="32" fill="#1D1D1F" font-size="32" font-weight="600">Buenos días, Fabián</text>
    <text x="0" y="60" fill="#9CA3AF" font-size="15">Martes, 13 de Mayo</text>

    <!-- Tarjeta de progreso grupal -->
    <g transform="translate(540, -8)">
      <rect width="320" height="120" rx="12" fill="#F7F7F8" stroke="#E5E7EB" stroke-width="1"/>

      <!-- Header -->
      <circle cx="40" cy="32" r="6" fill="none" stroke="#4B5563" stroke-width="1.5"/>
      <circle cx="50" cy="32" r="6" fill="none" stroke="#4B5563" stroke-width="1.5"/>
      <text x="68" y="36" fill="#4B5563" font-size="13" font-weight="500">Tu grupo hoy</text>

      <!-- Barra de progreso -->
      <rect x="24" y="56" width="208" height="8" rx="4" fill="#FFFFFF"/>
      <rect x="24" y="56" width="125" height="8" rx="4" fill="#10B981"/>
      <text x="248" y="64" fill="#1D1D1F" font-size="15" font-weight="600">3 / 5</text>

      <!-- Caption -->
      <text x="24" y="92" fill="#9CA3AF" font-size="11">2 tareas pendientes en el grupo.</text>
    </g>
  </g>

  <!-- =========================================== -->
  <!-- SECCIÓN: Tareas prioritarias -->
  <!-- =========================================== -->
  <g transform="translate(272, 240)">
    <text x="0" y="0" fill="#1D1D1F" font-size="17" font-weight="600">Tus 3 tareas prioritarias</text>
    <text x="860" y="0" fill="#9CA3AF" font-size="11" text-anchor="end">Foco mínimo · máximo impacto</text>

    <!-- Tarea 1: Alta -->
    <g transform="translate(0, 20)">
      <rect width="860" height="68" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="32" cy="34" r="11" fill="white" stroke="#D1D5DB" stroke-width="2"/>
      <text x="58" y="30" fill="#1D1D1F" font-size="14" font-weight="500">Estudiar para prueba de Suelos</text>
      <g transform="translate(58, 42)" fill="#9CA3AF" font-size="11">
        <text x="0" y="10">Mañana</text>
        <text x="60" y="10">·</text>
        <text x="76" y="10">Suelos</text>
        <rect x="130" y="-2" width="38" height="16" rx="999" fill="#FEE2E2"/>
        <text x="149" y="10" fill="#EF4444" font-weight="500" text-anchor="middle">Alta</text>
      </g>
    </g>

    <!-- Tarea 2: Alta -->
    <g transform="translate(0, 96)">
      <rect width="860" height="68" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="32" cy="34" r="11" fill="white" stroke="#D1D5DB" stroke-width="2"/>
      <text x="58" y="30" fill="#1D1D1F" font-size="14" font-weight="500">Entregar informe de cultivos</text>
      <g transform="translate(58, 42)" fill="#9CA3AF" font-size="11">
        <text x="0" y="10">Hoy</text>
        <text x="40" y="10">·</text>
        <text x="56" y="10">Cultivos</text>
        <rect x="116" y="-2" width="38" height="16" rx="999" fill="#FEE2E2"/>
        <text x="135" y="10" fill="#EF4444" font-weight="500" text-anchor="middle">Alta</text>
      </g>
    </g>

    <!-- Tarea 3: Media -->
    <g transform="translate(0, 172)">
      <rect width="860" height="68" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="32" cy="34" r="11" fill="white" stroke="#D1D5DB" stroke-width="2"/>
      <text x="58" y="30" fill="#1D1D1F" font-size="14" font-weight="500">Leer artículo de Sustentabilidad</text>
      <g transform="translate(58, 42)" fill="#9CA3AF" font-size="11">
        <text x="0" y="10">Hoy</text>
        <text x="40" y="10">·</text>
        <text x="56" y="10">Sustentabilidad</text>
        <rect x="160" y="-2" width="46" height="16" rx="999" fill="#FEF3C7"/>
        <text x="183" y="10" fill="#F59E0B" font-weight="500" text-anchor="middle">Media</text>
      </g>
    </g>
  </g>

  <!-- =========================================== -->
  <!-- SECCIÓN: Compañeros activos -->
  <!-- =========================================== -->
  <g transform="translate(272, 540)">
    <text x="0" y="0" fill="#1D1D1F" font-size="17" font-weight="600">Compañeros activos ahora</text>
    <text x="860" y="0" fill="#2563EB" font-size="13" font-weight="500" text-anchor="end">Ver grupo completo →</text>

    <!-- Peer card 1: Camila -->
    <g transform="translate(0, 20)">
      <rect width="180" height="100" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="32" cy="32" r="16" fill="#EC4899"/>
      <text x="32" y="37" fill="white" font-size="12" font-weight="600" text-anchor="middle">C</text>
      <text x="56" y="28" fill="#1D1D1F" font-size="13" font-weight="600">Camila</text>
      <circle cx="60" cy="44" r="3" fill="#10B981"/>
      <text x="68" y="48" fill="#9CA3AF" font-size="11">2/3 hoy</text>
      <rect x="16" y="76" width="148" height="6" rx="3" fill="#F7F7F8"/>
      <rect x="16" y="76" width="98" height="6" rx="3" fill="#10B981"/>
    </g>

    <!-- Peer card 2: Joaquín -->
    <g transform="translate(196, 20)">
      <rect width="180" height="100" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="32" cy="32" r="16" fill="#F59E0B"/>
      <text x="32" y="37" fill="white" font-size="12" font-weight="600" text-anchor="middle">J</text>
      <text x="56" y="28" fill="#1D1D1F" font-size="13" font-weight="600">Joaquín</text>
      <circle cx="60" cy="44" r="3" fill="#10B981"/>
      <text x="68" y="48" fill="#9CA3AF" font-size="11">1/2 hoy</text>
      <rect x="16" y="76" width="148" height="6" rx="3" fill="#F7F7F8"/>
      <rect x="16" y="76" width="74" height="6" rx="3" fill="#10B981"/>
    </g>

    <!-- Peer card 3: Valentina -->
    <g transform="translate(392, 20)">
      <rect width="180" height="100" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="32" cy="32" r="16" fill="#10B981"/>
      <text x="32" y="37" fill="white" font-size="12" font-weight="600" text-anchor="middle">V</text>
      <text x="56" y="28" fill="#1D1D1F" font-size="13" font-weight="600">Valentina</text>
      <circle cx="60" cy="44" r="3" fill="#10B981"/>
      <text x="68" y="48" fill="#9CA3AF" font-size="11">3/3 hoy</text>
      <rect x="16" y="76" width="148" height="6" rx="3" fill="#F7F7F8"/>
      <rect x="16" y="76" width="148" height="6" rx="3" fill="#10B981"/>
    </g>

    <!-- Peer card 4: Diego -->
    <g transform="translate(588, 20)">
      <rect width="180" height="100" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="32" cy="32" r="16" fill="#8B5CF6"/>
      <text x="32" y="37" fill="white" font-size="12" font-weight="600" text-anchor="middle">D</text>
      <text x="56" y="28" fill="#1D1D1F" font-size="13" font-weight="600">Diego</text>
      <circle cx="60" cy="44" r="3" fill="#10B981"/>
      <text x="68" y="48" fill="#9CA3AF" font-size="11">0/1 hoy</text>
      <rect x="16" y="76" width="148" height="6" rx="3" fill="#F7F7F8"/>
    </g>
  </g>

  <!-- =========================================== -->
  <!-- ANOTACIÓN (esquina inferior derecha) -->
  <!-- =========================================== -->
  <g transform="translate(1080, 760)" fill="#9CA3AF" font-size="10">
    <text x="200" y="0" text-anchor="end">Wireframe · Pantalla 1/4 · Vista Hoy (Desktop)</text>
  </g>
</svg>
