<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <!-- Fondo de la app (atenuado) -->
  <rect width="1280" height="800" fill="#FFFFFF"/>

  <!-- SIDEBAR (atenuado) -->
  <rect x="0" y="0" width="240" height="800" fill="#F7F7F8" opacity="0.4"/>
  <line x1="240" y1="0" x2="240" y2="800" stroke="#E5E7EB" stroke-width="1" opacity="0.4"/>

  <!-- TOPBAR (atenuada) -->
  <line x1="240" y1="64" x2="1280" y2="64" stroke="#E5E7EB" stroke-width="1" opacity="0.4"/>

  <!-- Backdrop (overlay del modal) -->
  <rect width="1280" height="800" fill="rgba(0,0,0,0.4)"/>

  <!-- =========================================== -->
  <!-- MODAL CENTRADO -->
  <!-- =========================================== -->
  <g transform="translate(400, 120)">
    <!-- Sombra simulada (rect mayor, blur) -->
    <rect x="-4" y="0" width="488" height="568" rx="14" fill="rgba(0,0,0,0.15)" opacity="0.3"/>

    <!-- Panel del modal -->
    <rect width="480" height="560" rx="12" fill="white"/>

    <!-- Header del modal -->
    <text x="24" y="36" fill="#1D1D1F" font-size="17" font-weight="600">Nueva tarea</text>

    <!-- Botón cerrar -->
    <g transform="translate(424, 16)">
      <rect width="32" height="32" rx="8" fill="transparent"/>
      <line x1="12" y1="12" x2="20" y2="20" stroke="#4B5563" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="12" x2="12" y2="20" stroke="#4B5563" stroke-width="2" stroke-linecap="round"/>
    </g>

    <line x1="0" y1="64" x2="480" y2="64" stroke="#E5E7EB" stroke-width="1"/>

    <!-- Form -->
    <g transform="translate(24, 88)">
      <!-- Campo: Título -->
      <text x="0" y="0" fill="#4B5563" font-size="13" font-weight="500">Título *</text>
      <rect x="0" y="12" width="432" height="44" rx="8" fill="white" stroke="#2563EB" stroke-width="2"/>
      <text x="14" y="40" fill="#1D1D1F" font-size="14">Preparar resumen del capítulo 5</text>
      <line x1="248" y1="22" x2="248" y2="48" stroke="#2563EB" stroke-width="2"/>

      <!-- Campo: Descripción -->
      <g transform="translate(0, 76)">
        <text x="0" y="0" fill="#4B5563" font-size="13" font-weight="500">Descripción</text>
        <rect x="0" y="12" width="432" height="60" rx="8" fill="#F7F7F8"/>
        <text x="14" y="36" fill="#9CA3AF" font-size="14">Opcional: detalles, capítulos, lo que sea útil</text>
      </g>

      <!-- Fila: Fecha + Asignatura -->
      <g transform="translate(0, 172)">
        <!-- Fecha -->
        <text x="0" y="0" fill="#4B5563" font-size="13" font-weight="500">Fecha *</text>
        <rect x="0" y="12" width="210" height="44" rx="8" fill="#F7F7F8"/>
        <text x="14" y="40" fill="#1D1D1F" font-size="14">15/05/2026</text>
        <g transform="translate(178, 24)">
          <rect width="20" height="20" rx="2" fill="none" stroke="#4B5563" stroke-width="1.5"/>
          <line x1="6" y1="6" x2="6" y2="2" stroke="#4B5563" stroke-width="1.5"/>
          <line x1="14" y1="6" x2="14" y2="2" stroke="#4B5563" stroke-width="1.5"/>
          <line x1="2" y1="9" x2="18" y2="9" stroke="#4B5563" stroke-width="1.5"/>
        </g>

        <!-- Asignatura -->
        <g transform="translate(222, 0)">
          <text x="0" y="0" fill="#4B5563" font-size="13" font-weight="500">Asignatura</text>
          <rect x="0" y="12" width="210" height="44" rx="8" fill="#F7F7F8"/>
          <text x="14" y="40" fill="#1D1D1F" font-size="14">Suelos</text>
          <path d="M 188 30 L 192 34 L 196 30" fill="none" stroke="#4B5563" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>

      <!-- Campo: Prioridad -->
      <g transform="translate(0, 248)">
        <text x="0" y="0" fill="#4B5563" font-size="13" font-weight="500">Prioridad</text>

        <!-- Opción Alta -->
        <g transform="translate(0, 12)">
          <rect width="138" height="32" rx="999" fill="#FEE2E2"/>
          <text x="69" y="20" fill="#EF4444" font-size="13" font-weight="500" text-anchor="middle">Alta</text>
        </g>

        <!-- Opción Media (seleccionada) -->
        <g transform="translate(148, 12)">
          <rect width="138" height="32" rx="999" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
          <text x="69" y="20" fill="#F59E0B" font-size="13" font-weight="500" text-anchor="middle">Media</text>
        </g>

        <!-- Opción Baja -->
        <g transform="translate(296, 12)">
          <rect width="136" height="32" rx="999" fill="#D1FAE5"/>
          <text x="68" y="20" fill="#10B981" font-size="13" font-weight="500" text-anchor="middle">Baja</text>
        </g>
      </g>
    </g>

    <!-- Footer del modal -->
    <line x1="0" y1="488" x2="480" y2="488" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(24, 512)">
      <!-- Cancelar -->
      <rect x="220" width="92" height="36" rx="8" fill="#F7F7F8" stroke="#E5E7EB"/>
      <text x="266" y="23" fill="#1D1D1F" font-size="13" font-weight="500" text-anchor="middle">Cancelar</text>

      <!-- Guardar (primario) -->
      <g transform="translate(320, 0)">
        <rect width="112" height="36" rx="8" fill="#2563EB"/>
        <path d="M 18 18 L 22 22 L 30 14" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="68" y="23" fill="white" font-size="13" font-weight="500">Guardar</text>
      </g>
    </g>
  </g>

  <!-- ANOTACIÓN -->
  <g transform="translate(1080, 760)" fill="white" font-size="10">
    <text x="200" y="0" text-anchor="end" opacity="0.7">Wireframe · Pantalla 4/4 · Modal Nueva tarea (Desktop)</text>
  </g>
</svg>
