<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 820" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <rect width="400" height="820" fill="#FFFFFF"/>

  <!-- Status bar -->
  <text x="32" y="28" fill="#1D1D1F" font-size="13" font-weight="600">9:41</text>
  <g transform="translate(340, 16)">
    <rect width="20" height="12" rx="2" fill="none" stroke="#1D1D1F" stroke-width="1.5"/>
    <rect x="22" y="4" width="2" height="4" rx="1" fill="#1D1D1F"/>
  </g>

  <!-- TOPBAR -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="#E5E7EB" stroke-width="1"/>
  <g transform="translate(16, 60)">
    <rect width="32" height="32" rx="8" fill="transparent"/>
    <line x1="8" y1="11" x2="24" y2="11" stroke="#1D1D1F" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="16" x2="24" y2="16" stroke="#1D1D1F" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="21" x2="24" y2="21" stroke="#1D1D1F" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="64" y="84" fill="#1D1D1F" font-size="20" font-weight="600">Mi grupo</text>

  <g transform="translate(344, 60)">
    <rect width="36" height="36" rx="8" fill="#2563EB"/>
    <line x1="13" y1="18" x2="23" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="13" x2="18" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Header del grupo -->
  <g transform="translate(16, 124)">
    <text x="0" y="20" fill="#1D1D1F" font-size="18" font-weight="600">TUPA · 2° año</text>
    <circle cx="6" cy="40" r="3" fill="#10B981"/>
    <text x="16" y="44" fill="#9CA3AF" font-size="11">6 estudiantes · en tiempo real</text>

    <!-- Stat -->
    <text x="368" y="22" fill="#10B981" font-size="28" font-weight="700" text-anchor="end">15</text>
    <text x="368" y="44" fill="#9CA3AF" font-size="9" text-anchor="end" letter-spacing="0.5">COMPLETADAS</text>

    <line x1="0" y1="60" x2="368" y2="60" stroke="#E5E7EB" stroke-width="1"/>
  </g>

  <!-- Lista de miembros (1 columna en móvil) -->
  <g transform="translate(16, 208)">

    <!-- Fabián (tú) - destacado -->
    <g transform="translate(0, 0)">
      <rect width="368" height="120" rx="12" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>

      <!-- Header con avatar -->
      <circle cx="28" cy="28" r="18" fill="#2563EB"/>
      <text x="28" y="33" fill="white" font-size="14" font-weight="600" text-anchor="middle">F</text>
      <text x="56" y="24" fill="#1D1D1F" font-size="14" font-weight="600">Fabián (tú)</text>
      <text x="56" y="38" fill="#9CA3AF" font-size="11">2/4 esta semana</text>

      <!-- Tarea destacada -->
      <g transform="translate(16, 58)">
        <rect width="336" height="22" rx="4" fill="#F7F7F8"/>
        <circle cx="11" cy="11" r="5" fill="none" stroke="#D1D5DB" stroke-width="1.5"/>
        <text x="22" y="14" fill="#4B5563" font-size="11">Estudiar para prueba de Suelos</text>
      </g>

      <!-- Barra de progreso -->
      <g transform="translate(16, 92)">
        <text x="0" y="0" fill="#4B5563" font-size="10">Progreso</text>
        <text x="336" y="0" fill="#4B5563" font-size="10" text-anchor="end">50%</text>
        <rect x="0" y="6" width="336" height="5" rx="2.5" fill="white"/>
        <rect x="0" y="6" width="168" height="5" rx="2.5" fill="#10B981"/>
      </g>
    </g>

    <!-- Camila -->
    <g transform="translate(0, 132)">
      <rect width="368" height="120" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="28" cy="28" r="18" fill="#EC4899"/>
      <text x="28" y="33" fill="white" font-size="14" font-weight="600" text-anchor="middle">C</text>
      <text x="56" y="24" fill="#1D1D1F" font-size="14" font-weight="600">Camila Soto</text>
      <text x="56" y="38" fill="#9CA3AF" font-size="11">3/3 esta semana</text>

      <g transform="translate(16, 58)">
        <rect width="336" height="22" rx="4" fill="#F7F7F8"/>
        <circle cx="11" cy="11" r="5" fill="#10B981"/>
        <path d="M 8.5 11 L 10.5 13 L 14 9" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <text x="22" y="14" fill="#9CA3AF" font-size="11" text-decoration="line-through">Ejercicios Estadística</text>
      </g>

      <g transform="translate(16, 92)">
        <text x="0" y="0" fill="#4B5563" font-size="10">Progreso</text>
        <text x="336" y="0" fill="#4B5563" font-size="10" text-anchor="end">100%</text>
        <rect x="0" y="6" width="336" height="5" rx="2.5" fill="#F7F7F8"/>
        <rect x="0" y="6" width="336" height="5" rx="2.5" fill="#10B981"/>
      </g>
    </g>

    <!-- Joaquín -->
    <g transform="translate(0, 264)">
      <rect width="368" height="120" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="28" cy="28" r="18" fill="#F59E0B"/>
      <text x="28" y="33" fill="white" font-size="14" font-weight="600" text-anchor="middle">J</text>
      <text x="56" y="24" fill="#1D1D1F" font-size="14" font-weight="600">Joaquín Pérez</text>
      <text x="56" y="38" fill="#9CA3AF" font-size="11">1/3 esta semana</text>

      <g transform="translate(16, 58)">
        <rect width="336" height="22" rx="4" fill="#F7F7F8"/>
        <circle cx="11" cy="11" r="5" fill="none" stroke="#D1D5DB" stroke-width="1.5"/>
        <text x="22" y="14" fill="#4B5563" font-size="11">Informe de cultivos</text>
      </g>

      <g transform="translate(16, 92)">
        <text x="0" y="0" fill="#4B5563" font-size="10">Progreso</text>
        <text x="336" y="0" fill="#4B5563" font-size="10" text-anchor="end">33%</text>
        <rect x="0" y="6" width="336" height="5" rx="2.5" fill="#F7F7F8"/>
        <rect x="0" y="6" width="111" height="5" rx="2.5" fill="#10B981"/>
      </g>
    </g>

    <!-- Indicador "scroll para ver más" -->
    <g transform="translate(184, 408)">
      <text x="0" y="0" fill="#9CA3AF" font-size="10" text-anchor="middle">3 miembros más abajo</text>
      <path d="M -8 8 L 0 16 L 8 8" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Bottom nav -->
  <line x1="0" y1="740" x2="400" y2="740" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="0" y="740" width="400" height="80" fill="white"/>

  <g transform="translate(40, 752)">
    <circle cx="20" cy="14" r="8" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <text x="20" y="44" fill="#9CA3AF" font-size="11" text-anchor="middle">Hoy</text>
  </g>
  <g transform="translate(120, 752)">
    <rect x="12" y="6" width="16" height="16" rx="2" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <text x="20" y="44" fill="#9CA3AF" font-size="11" text-anchor="middle">Calendario</text>
  </g>
  <!-- Tab activo: Grupo -->
  <g transform="translate(200, 752)">
    <circle cx="16" cy="14" r="5" fill="none" stroke="#2563EB" stroke-width="2"/>
    <circle cx="26" cy="14" r="5" fill="none" stroke="#2563EB" stroke-width="2"/>
    <text x="20" y="44" fill="#2563EB" font-size="11" font-weight="600" text-anchor="middle">Grupo</text>
  </g>
  <g transform="translate(280, 752)">
    <rect x="13" y="12" width="3" height="10" rx="1" fill="#9CA3AF"/>
    <rect x="18" y="8" width="3" height="14" rx="1" fill="#9CA3AF"/>
    <rect x="23" y="4" width="3" height="18" rx="1" fill="#9CA3AF"/>
    <text x="20" y="44" fill="#9CA3AF" font-size="11" text-anchor="middle">Resumen</text>
  </g>

  <g transform="translate(200, 808)" fill="#9CA3AF" font-size="9">
    <text x="0" y="0" text-anchor="middle">Wireframe móvil · Pantalla Mi grupo</text>
  </g>
</svg>
