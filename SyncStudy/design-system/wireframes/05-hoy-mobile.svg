<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 820" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <!-- Fondo del dispositivo -->
  <rect width="400" height="820" fill="#FFFFFF"/>

  <!-- Status bar simulada -->
  <rect width="400" height="44" fill="#FFFFFF"/>
  <text x="32" y="28" fill="#1D1D1F" font-size="13" font-weight="600">9:41</text>
  <g transform="translate(340, 16)">
    <rect width="20" height="12" rx="2" fill="none" stroke="#1D1D1F" stroke-width="1.5"/>
    <rect x="22" y="4" width="2" height="4" rx="1" fill="#1D1D1F"/>
  </g>

  <!-- =========================================== -->
  <!-- TOPBAR -->
  <!-- =========================================== -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="#E5E7EB" stroke-width="1"/>
  <g transform="translate(16, 60)">
    <!-- Botón menú (hamburguesa) -->
    <rect width="32" height="32" rx="8" fill="transparent"/>
    <line x1="8" y1="11" x2="24" y2="11" stroke="#1D1D1F" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="16" x2="24" y2="16" stroke="#1D1D1F" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="21" x2="24" y2="21" stroke="#1D1D1F" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="64" y="84" fill="#1D1D1F" font-size="20" font-weight="600">Hoy</text>

  <!-- Botón Nueva tarea (icono solo en móvil) -->
  <g transform="translate(344, 60)">
    <rect width="36" height="36" rx="8" fill="#2563EB"/>
    <line x1="13" y1="18" x2="23" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="13" x2="18" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- =========================================== -->
  <!-- HERO -->
  <!-- =========================================== -->
  <g transform="translate(16, 124)">
    <text x="0" y="24" fill="#1D1D1F" font-size="22" font-weight="600">Buenos días, Fabián</text>
    <text x="0" y="48" fill="#9CA3AF" font-size="13">Martes, 13 de Mayo</text>

    <!-- Tarjeta de progreso grupal -->
    <g transform="translate(0, 64)">
      <rect width="368" height="100" rx="12" fill="#F7F7F8" stroke="#E5E7EB" stroke-width="1"/>

      <!-- Header -->
      <circle cx="24" cy="24" r="5" fill="none" stroke="#4B5563" stroke-width="1.5"/>
      <circle cx="32" cy="24" r="5" fill="none" stroke="#4B5563" stroke-width="1.5"/>
      <text x="48" y="28" fill="#4B5563" font-size="12" font-weight="500">Tu grupo hoy</text>
      <text x="344" y="28" fill="#1D1D1F" font-size="14" font-weight="600" text-anchor="end">3 / 5</text>

      <!-- Barra de progreso -->
      <rect x="16" y="48" width="336" height="8" rx="4" fill="#FFFFFF"/>
      <rect x="16" y="48" width="202" height="8" rx="4" fill="#10B981"/>

      <!-- Caption -->
      <text x="16" y="80" fill="#9CA3AF" font-size="11">2 tareas pendientes en el grupo.</text>
    </g>
  </g>

  <!-- =========================================== -->
  <!-- TAREAS PRIORITARIAS -->
  <!-- =========================================== -->
  <g transform="translate(16, 320)">
    <text x="0" y="0" fill="#1D1D1F" font-size="15" font-weight="600">Tus 3 tareas prioritarias</text>

    <!-- Tarea 1 -->
    <g transform="translate(0, 16)">
      <rect width="368" height="72" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="28" cy="36" r="11" fill="white" stroke="#D1D5DB" stroke-width="2"/>
      <text x="52" y="32" fill="#1D1D1F" font-size="13" font-weight="500">Estudiar para prueba de Suelos</text>
      <g transform="translate(52, 44)" fill="#9CA3AF" font-size="11">
        <text x="0" y="12">Mañana · Suelos</text>
        <rect x="116" y="0" width="36" height="16" rx="999" fill="#FEE2E2"/>
        <text x="134" y="12" fill="#EF4444" font-weight="500" text-anchor="middle">Alta</text>
      </g>
    </g>

    <!-- Tarea 2 -->
    <g transform="translate(0, 96)">
      <rect width="368" height="72" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="28" cy="36" r="11" fill="white" stroke="#D1D5DB" stroke-width="2"/>
      <text x="52" y="32" fill="#1D1D1F" font-size="13" font-weight="500">Entregar informe de cultivos</text>
      <g transform="translate(52, 44)" fill="#9CA3AF" font-size="11">
        <text x="0" y="12">Hoy · Cultivos</text>
        <rect x="98" y="0" width="36" height="16" rx="999" fill="#FEE2E2"/>
        <text x="116" y="12" fill="#EF4444" font-weight="500" text-anchor="middle">Alta</text>
      </g>
    </g>

    <!-- Tarea 3 -->
    <g transform="translate(0, 176)">
      <rect width="368" height="72" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="28" cy="36" r="11" fill="white" stroke="#D1D5DB" stroke-width="2"/>
      <text x="52" y="32" fill="#1D1D1F" font-size="13" font-weight="500">Leer artículo Sustentabilidad</text>
      <g transform="translate(52, 44)" fill="#9CA3AF" font-size="11">
        <text x="0" y="12">Hoy · Sustentabilidad</text>
        <rect x="132" y="0" width="44" height="16" rx="999" fill="#FEF3C7"/>
        <text x="154" y="12" fill="#F59E0B" font-weight="500" text-anchor="middle">Media</text>
      </g>
    </g>
  </g>

  <!-- =========================================== -->
  <!-- COMPAÑEROS -->
  <!-- =========================================== -->
  <g transform="translate(16, 600)">
    <text x="0" y="0" fill="#1D1D1F" font-size="15" font-weight="600">Compañeros</text>
    <text x="368" y="0" fill="#2563EB" font-size="12" font-weight="500" text-anchor="end">Ver grupo →</text>

    <!-- Peer strip horizontal -->
    <g transform="translate(0, 16)">
      <!-- Peer 1: Camila -->
      <g transform="translate(0, 0)">
        <rect width="116" height="92" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <circle cx="24" cy="24" r="14" fill="#EC4899"/>
        <text x="24" y="28" fill="white" font-size="11" font-weight="600" text-anchor="middle">C</text>
        <text x="44" y="22" fill="#1D1D1F" font-size="12" font-weight="600">Camila</text>
        <text x="44" y="36" fill="#9CA3AF" font-size="10">2/3 hoy</text>
        <rect x="12" y="72" width="92" height="6" rx="3" fill="#F7F7F8"/>
        <rect x="12" y="72" width="61" height="6" rx="3" fill="#10B981"/>
      </g>

      <!-- Peer 2: Joaquín -->
      <g transform="translate(124, 0)">
        <rect width="116" height="92" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <circle cx="24" cy="24" r="14" fill="#F59E0B"/>
        <text x="24" y="28" fill="white" font-size="11" font-weight="600" text-anchor="middle">J</text>
        <text x="44" y="22" fill="#1D1D1F" font-size="12" font-weight="600">Joaquín</text>
        <text x="44" y="36" fill="#9CA3AF" font-size="10">1/2 hoy</text>
        <rect x="12" y="72" width="92" height="6" rx="3" fill="#F7F7F8"/>
        <rect x="12" y="72" width="46" height="6" rx="3" fill="#10B981"/>
      </g>

      <!-- Peer 3: Valentina (parcialmente visible, indica scroll) -->
      <g transform="translate(248, 0)">
        <rect width="116" height="92" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <circle cx="24" cy="24" r="14" fill="#10B981"/>
        <text x="24" y="28" fill="white" font-size="11" font-weight="600" text-anchor="middle">V</text>
        <text x="44" y="22" fill="#1D1D1F" font-size="12" font-weight="600">Valentina</text>
        <text x="44" y="36" fill="#9CA3AF" font-size="10">3/3 hoy</text>
        <rect x="12" y="72" width="92" height="6" rx="3" fill="#F7F7F8"/>
        <rect x="12" y="72" width="92" height="6" rx="3" fill="#10B981"/>
      </g>

      <!-- Indicador de scroll -->
      <text x="376" y="50" fill="#D1D5DB" font-size="18">→</text>
    </g>
  </g>

  <!-- =========================================== -->
  <!-- TAB BAR INFERIOR (Bottom Navigation - típico móvil) -->
  <!-- =========================================== -->
  <line x1="0" y1="740" x2="400" y2="740" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="0" y="740" width="400" height="80" fill="white"/>

  <!-- Tab: Hoy (activo) -->
  <g transform="translate(40, 752)">
    <circle cx="20" cy="14" r="8" fill="none" stroke="#2563EB" stroke-width="2"/>
    <text x="20" y="44" fill="#2563EB" font-size="11" font-weight="600" text-anchor="middle">Hoy</text>
  </g>

  <!-- Tab: Calendario -->
  <g transform="translate(120, 752)">
    <rect x="12" y="6" width="16" height="16" rx="2" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <text x="20" y="44" fill="#9CA3AF" font-size="11" text-anchor="middle">Calendario</text>
  </g>

  <!-- Tab: Grupo -->
  <g transform="translate(200, 752)">
    <circle cx="16" cy="14" r="5" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <circle cx="26" cy="14" r="5" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <text x="20" y="44" fill="#9CA3AF" font-size="11" text-anchor="middle">Grupo</text>
  </g>

  <!-- Tab: Resumen -->
  <g transform="translate(280, 752)">
    <rect x="13" y="12" width="3" height="10" rx="1" fill="#9CA3AF"/>
    <rect x="18" y="8" width="3" height="14" rx="1" fill="#9CA3AF"/>
    <rect x="23" y="4" width="3" height="18" rx="1" fill="#9CA3AF"/>
    <text x="20" y="44" fill="#9CA3AF" font-size="11" text-anchor="middle">Resumen</text>
  </g>

  <!-- ANOTACIÓN -->
  <g transform="translate(200, 808)" fill="#9CA3AF" font-size="9">
    <text x="0" y="0" text-anchor="middle">Wireframe móvil · Pantalla Hoy</text>
  </g>
</svg>
